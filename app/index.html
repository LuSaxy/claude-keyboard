<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clawd Control</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="bar">
        <div class="brand">
          <span class="mark">CLAWD</span>
          <span class="sub">BLE CONTROL</span>
        </div>
        <span id="status" class="status">DISCONNECTED</span>
      </header>

      <!-- LEFT: device + log -->
      <div class="col left">
        <section class="panel">
          <h2>DEVICE</h2>
          <p class="hint">
            Pair <b>clawd</b> in your OS Bluetooth settings first, then connect.
            Chrome / Edge only.
          </p>
          <div class="ctl">
            <button id="connect" class="btn primary">CONNECT</button>
            <button id="disconnect" class="btn" disabled>DROP</button>
          </div>
        </section>

        <section class="panel grow">
          <h2>LOG</h2>
          <pre id="log" class="log">Ready. Press CONNECT.</pre>
        </section>
      </div>

      <!-- RIGHT: settings -->
      <div class="col right">
        <section class="panel" data-requires-connection>
          <h2>NAME</h2>
          <div class="ctl">
            <input id="device-name" maxlength="15" autocomplete="off" placeholder="clawd" />
            <button id="save-name" class="btn">SET</button>
            <button id="reset-name" class="btn">RST</button>
          </div>
        </section>

        <section class="panel" data-requires-connection>
          <h2>LED <span id="led-value" class="val">0</span></h2>
          <input id="led-slider" type="range" min="0" max="255" value="0" />
          <div class="grid4">
            <button class="btn" data-led="0">OFF</button>
            <button class="btn" data-led="64">LOW</button>
            <button class="btn" data-led="128">MID</button>
            <button class="btn" data-led="255">MAX</button>
          </div>
        </section>

        <section class="panel" data-requires-connection>
          <h2>BUTTONS</h2>
          <div class="keys">
            <article class="key">
              <span class="tag">B1</span>
              <select id="b1-type"></select>
              <select id="b1-code"></select>
              <div class="mods" id="b1-mods">
                <label><input id="b1-ctrl" type="checkbox" />CTRL</label>
                <label><input id="b1-shift" type="checkbox" />SHFT</label>
                <label><input id="b1-alt" type="checkbox" />ALT</label>
                <label><input id="b1-gui" type="checkbox" />GUI</label>
              </div>
            </article>

            <article class="key">
              <span class="tag">B2</span>
              <select id="b2-type"></select>
              <select id="b2-code"></select>
              <div class="mods" id="b2-mods">
                <label><input id="b2-ctrl" type="checkbox" />CTRL</label>
                <label><input id="b2-shift" type="checkbox" />SHFT</label>
                <label><input id="b2-alt" type="checkbox" />ALT</label>
                <label><input id="b2-gui" type="checkbox" />GUI</label>
              </div>
            </article>
          </div>
          <div class="ctl">
            <button id="save-keys" class="btn primary">SAVE</button>
            <button id="reset-keys" class="btn">RESET F13/F14</button>
          </div>
        </section>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
